<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>미네 | Wine Diary</title>
<style>
  :root{
    --black:#0a0a0a;
    --black-2:#161616;
    --black-3:#1f1f1f;
    --white:#ffffff;
    --gray:#9a9a9a;
    --red:#8a1828;
    --red-dark:#550812;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    background:var(--black);
    color:var(--white);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    height:100%;
    -webkit-tap-highlight-color:transparent;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    position:relative;
    padding-bottom:90px;
  }
  header{
    position:sticky;
    top:0;
    z-index:20;
    background:var(--black);
    padding:18px 18px 10px;
    border-bottom:1px solid var(--black-3);
  }
  header h1{
    font-size:22px;
    font-weight:800;
    letter-spacing:-0.3px;
  }
  header h1 span{color:var(--red);}
  .sub{
    color:var(--gray);
    font-size:12.5px;
    margin-top:2px;
  }
  .search-wrap{
    padding:12px 18px;
    background:var(--black);
    position:sticky;
    top:64px;
    z-index:19;
  }
  .search-box{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--black-2);
    border:1px solid var(--black-3);
    border-radius:12px;
    padding:10px 12px;
  }
  .search-box svg{flex:none;opacity:0.6;}
  .search-box input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--white);
    font-size:14.5px;
  }
  .search-box input::placeholder{color:var(--gray);}
  .filters{
    display:flex;
    gap:8px;
    padding:0 18px 6px;
    overflow-x:auto;
    scrollbar-width:none;
  }
  .filters::-webkit-scrollbar{display:none;}
  .chip{
    flex:none;
    font-size:12.5px;
    padding:6px 12px;
    border-radius:999px;
    border:1px solid var(--black-3);
    color:var(--gray);
    background:var(--black-2);
    white-space:nowrap;
  }
  .chip.active{
    background:var(--red);
    border-color:var(--red);
    color:var(--white);
    font-weight:600;
  }
  main{padding:10px 18px 18px;}
  .stats{
    display:flex;
    gap:10px;
    margin:6px 0 16px;
  }
  .stat{
    flex:1;
    background:var(--black-2);
    border:1px solid var(--black-3);
    border-radius:12px;
    padding:12px;
    text-align:center;
  }
  .stat b{display:block;font-size:19px;font-weight:800;}
  .stat span{font-size:11px;color:var(--gray);}
  .empty{
    text-align:center;
    color:var(--gray);
    padding:60px 20px;
    font-size:13.5px;
    line-height:1.7;
  }
  .empty .glass{font-size:40px;display:block;margin-bottom:10px;}
  .card{
    display:flex;
    gap:12px;
    background:var(--black-2);
    border:1px solid var(--black-3);
    border-radius:14px;
    padding:12px;
    margin-bottom:12px;
    cursor:pointer;
    transition:border-color .15s;
  }
  .card:active{border-color:var(--red);}
  .card .thumb{
    width:64px;
    height:84px;
    flex:none;
    border-radius:8px;
    background:var(--black-3) center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--gray);
    font-size:22px;
    overflow:hidden;
  }
  .card .info{flex:1;min-width:0;}
  .card .name{
    font-size:15px;
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .card .winery{
    font-size:12.5px;
    color:var(--gray);
    margin-top:2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .card .meta{
    font-size:11.5px;
    color:var(--gray);
    margin-top:6px;
  }
  .card .meta span+span::before{content:" · ";}
  .stars{color:var(--red);font-size:13px;letter-spacing:1px;margin-top:6px;}
  .stars .off{color:var(--black-3);}

  .fab{
    position:fixed;
    right:calc(50% - 240px + 20px);
    bottom:26px;
    width:58px;
    height:58px;
    border-radius:50%;
    background:var(--red);
    color:var(--white);
    border:none;
    font-size:28px;
    font-weight:400;
    box-shadow:0 6px 18px rgba(224,17,43,0.45);
    z-index:30;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  @media (max-width:480px){
    .fab{right:20px;}
  }
  .fab:active{transform:scale(0.94);}

  .modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:50;
    display:flex;
    align-items:flex-end;
    justify-content:center;
  }
  .modal.hidden{display:none;}
  .sheet{
    width:100%;
    max-width:480px;
    max-height:92vh;
    overflow-y:auto;
    background:var(--black);
    border-top:1px solid var(--black-3);
    border-radius:20px 20px 0 0;
    padding:16px 18px calc(24px + env(safe-area-inset-bottom));
    animation:up .18s ease-out;
  }
  @keyframes up{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet-handle{
    width:36px;height:4px;background:var(--black-3);
    border-radius:2px;margin:0 auto 14px;
  }
  .sheet h2{font-size:18px;font-weight:800;margin-bottom:14px;}
  .field{margin-bottom:14px;}
  .field label{
    display:block;font-size:12px;color:var(--gray);
    margin-bottom:6px;font-weight:600;
  }
  .field input[type=text],
  .field input[type=number],
  .field input[type=date],
  .field textarea{
    width:100%;
    background:var(--black-2);
    border:1px solid var(--black-3);
    border-radius:10px;
    padding:11px 12px;
    color:var(--white);
    font-size:14.5px;
    outline:none;
    font-family:inherit;
  }
  .field textarea{resize:vertical;min-height:70px;}
  .row2{display:flex;gap:10px;}
  .row2 .field{flex:1;}
  .photo-upload{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .photo-preview{
    width:78px;height:104px;
    border-radius:10px;
    background:var(--black-2);
    border:1px dashed var(--black-3);
    background-size:cover;
    background-position:center;
    display:flex;align-items:center;justify-content:center;
    color:var(--gray);
    font-size:22px;
    flex:none;
  }
  .photo-btn{
    background:var(--black-2);
    border:1px solid var(--black-3);
    color:var(--white);
    padding:9px 14px;
    border-radius:10px;
    font-size:13px;
  }
  .rate-picker{display:flex;gap:8px;font-size:26px;color:var(--black-3);}
  .rate-picker .on{color:var(--red);}
  .btn-row{display:flex;gap:10px;margin-top:18px;}
  .btn{
    flex:1;
    padding:13px;
    border-radius:12px;
    border:none;
    font-size:14.5px;
    font-weight:700;
  }
  .btn-primary{background:var(--red);color:var(--white);}
  .btn-ghost{background:var(--black-2);color:var(--white);border:1px solid var(--black-3);}
  .btn-primary:active{background:var(--red-dark);}
  .btn-primary:disabled{opacity:0.6;}

  .detail-photo{
    width:100%;
    height:260px;
    border-radius:14px;
    background:var(--black-2) center/cover no-repeat;
    display:flex;align-items:center;justify-content:center;
    color:var(--gray);
    font-size:40px;
    margin-bottom:16px;
  }
  .detail-title{font-size:20px;font-weight:800;}
  .detail-sub{color:var(--gray);font-size:13.5px;margin-top:3px;}
  .detail-stars{margin:10px 0;font-size:18px;color:var(--red);letter-spacing:2px;}
  .detail-stars .off{color:var(--black-3);}
  .detail-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:14px 0;
  }
  .detail-grid .box{
    background:var(--black-2);
    border:1px solid var(--black-3);
    border-radius:10px;
    padding:10px 12px;
  }
  .detail-grid .box span{display:block;font-size:11px;color:var(--gray);margin-bottom:3px;}
  .detail-grid .box b{font-size:14px;font-weight:700;}
  .memo-box{
    background:var(--black-2);
    border:1px solid var(--black-3);
    border-radius:10px;
    padding:12px;
    font-size:13.5px;
    line-height:1.6;
    color:#e8e8e8;
    white-space:pre-wrap;
    margin-top:6px;
  }
  .close-x{
    position:absolute;
    top:14px;right:14px;
    width:32px;height:32px;
    border-radius:50%;
    background:var(--black-2);
    border:1px solid var(--black-3);
    color:var(--white);
    font-size:16px;
    display:flex;align-items:center;justify-content:center;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>미<span>네</span></h1>
    <div class="sub">"My Wine, Mine." · 내가 마신 와인을 기록하고 검색하세요</div>
  </header>

  <div class="search-wrap">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="와인 이름, 품종, 생산지, 메모 검색">
    </div>
  </div>
  <div class="filters" id="filterChips"></div>

  <main>
    <div class="stats" id="stats"></div>
    <div id="list"></div>
  </main>

  <button class="fab" id="addBtn">＋</button>
</div>

<!-- Add/Edit form -->
<div class="modal hidden" id="formModal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="formTitle">와인 기록 추가</h2>
    <form id="wineForm">
      <div class="field">
        <label>사진</label>
        <div class="photo-upload">
          <div class="photo-preview" id="photoPreview">🍷</div>
          <div>
            <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">
            <button type="button" class="photo-btn" id="photoBtn">사진 선택</button>
          </div>
        </div>
      </div>
      <div class="field">
        <label>와인 이름 *</label>
        <input type="text" id="fName" required placeholder="예: Château Margaux 2015">
      </div>
      <div class="row2">
        <div class="field">
          <label>와이너리</label>
          <input type="text" id="fWinery" placeholder="예: Château Margaux">
        </div>
        <div class="field">
          <label>빈티지</label>
          <input type="number" id="fVintage" placeholder="예: 2015" min="1900" max="2100">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>생산지</label>
          <input type="text" id="fRegion" placeholder="예: 프랑스 보르도">
        </div>
        <div class="field">
          <label>품종</label>
          <input type="text" id="fGrape" placeholder="예: 카베르네 소비뇽">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>가격</label>
          <input type="text" id="fPrice" placeholder="예: 55,000원">
        </div>
        <div class="field">
          <label>시음일</label>
          <input type="date" id="fDate">
        </div>
      </div>
      <div class="field">
        <label>평점</label>
        <div class="rate-picker" id="ratePicker">
          <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
        </div>
      </div>
      <div class="field">
        <label>테이스팅 노트</label>
        <textarea id="fMemo" placeholder="향, 맛, 어울리는 음식 등 자유롭게 기록하세요"></textarea>
      </div>
      <div class="btn-row">
        <button type="button" class="btn btn-ghost" id="cancelBtn">취소</button>
        <button type="submit" class="btn btn-primary">저장</button>
      </div>
    </form>
  </div>
</div>

<!-- Detail view -->
<div class="modal hidden" id="detailModal">
  <div class="sheet" style="position:relative;">
    <button class="close-x" id="detailClose">✕</button>
    <div class="detail-photo" id="detailPhoto">🍷</div>
    <div class="detail-title" id="detailName"></div>
    <div class="detail-sub" id="detailWinery"></div>
    <div class="detail-stars" id="detailStars"></div>
    <div class="detail-grid">
      <div class="box"><span>생산지</span><b id="detailRegion">-</b></div>
      <div class="box"><span>품종</span><b id="detailGrape">-</b></div>
      <div class="box"><span>가격</span><b id="detailPrice">-</b></div>
      <div class="box"><span>시음일</span><b id="detailDate">-</b></div>
    </div>
    <div>
      <label style="font-size:12px;color:var(--gray);font-weight:600;">테이스팅 노트</label>
      <div class="memo-box" id="detailMemo">-</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" id="editBtn">수정</button>
      <button class="btn btn-primary" style="background:var(--red-dark);" id="deleteBtn">삭제</button>
    </div>
  </div>
</div>

<script>
(function(){
  // ---- Supabase config ----
  const SUPABASE_URL = 'https://bhakdvqtlxuljcavfbre.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_5BNJKNmd2gztCfrz8UezTA_VaCDx271';
  const TABLE = 'wines';
  const HEADERS = {
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${SUPABASE_KEY}`
  };

  let entries = [];
  let editingId = null;
  let currentPhoto = null;
  let currentRating = 0;
  let activeFilter = 'all';
  let searchTerm = '';
  let detailId = null;

  const $ = id => document.getElementById(id);

  // UUID helper (crypto.randomUUID with fallback for older browsers)
  function makeId(){
    if(window.crypto && typeof window.crypto.randomUUID === 'function'){
      return window.crypto.randomUUID();
    }
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c=>{
      const r = Math.random()*16|0;
      const v = c === 'x' ? r : (r&0x3|0x8);
      return v.toString(16);
    });
  }

  // ---- Supabase REST helpers (PostgREST) ----
  async function apiGet(){
    const res = await fetch(`${SUPABASE_URL}/${TABLE}?select=*&order=created_at.desc`, { headers: HEADERS });
    if(!res.ok) throw new Error(`목록 조회 실패 (${res.status}) ${await res.text()}`);
    return res.json();
  }
  async function apiInsert(payload){
    const res = await fetch(`${SUPABASE_URL}/${TABLE}`, {
      method: 'POST',
      headers: { ...HEADERS, 'Content-Type': 'application/json', Prefer: 'return=representation' },
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error(`저장 실패 (${res.status}) ${await res.text()}`);
    const rows = await res.json();
    return rows[0];
  }
  async function apiUpdate(id, payload){
    const res = await fetch(`${SUPABASE_URL}/${TABLE}?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...HEADERS, 'Content-Type': 'application/json', Prefer: 'return=representation' },
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error(`수정 실패 (${res.status}) ${await res.text()}`);
    const rows = await res.json();
    return rows[0];
  }
  async function apiDelete(id){
    const res = await fetch(`${SUPABASE_URL}/${TABLE}?id=eq.${id}`, {
      method: 'DELETE',
      headers: HEADERS
    });
    if(!res.ok) throw new Error(`삭제 실패 (${res.status}) ${await res.text()}`);
  }

  function starsHtml(rating){
    let h = '';
    for(let i=1;i<=5;i++){
      h += `<span class="${i<=rating ? '' : 'off'}">★</span>`;
    }
    return h;
  }

  function renderChips(){
    const regions = [...new Set(entries.map(e=>e.region).filter(Boolean))];
    let chips = ['all', ...regions.slice(0,8)];
    $('filterChips').innerHTML = chips.map(c => {
      const label = c === 'all' ? '전체' : c;
      const active = activeFilter === c ? 'active' : '';
      return `<div class="chip ${active}" data-chip="${String(c).replace(/"/g,'&quot;')}">${label}</div>`;
    }).join('');
    document.querySelectorAll('.chip').forEach(el=>{
      el.addEventListener('click', ()=>{
        activeFilter = el.dataset.chip;
        renderChips();
        renderList();
      });
    });
  }

  function renderStats(){
    const total = entries.length;
    const avg = total ? (entries.reduce((s,e)=>s+(e.rating||0),0)/total).toFixed(1) : '0.0';
    const regions = new Set(entries.map(e=>e.region).filter(Boolean)).size;
    $('stats').innerHTML = `
      <div class="stat"><b>${total}</b><span>기록한 와인</span></div>
      <div class="stat"><b>${avg}</b><span>평균 평점</span></div>
      <div class="stat"><b>${regions}</b><span>생산지</span></div>
    `;
  }

  function filteredEntries(){
    let list = entries.slice();
    if(activeFilter !== 'all'){
      list = list.filter(e => e.region === activeFilter);
    }
    if(searchTerm.trim()){
      const t = searchTerm.trim().toLowerCase();
      list = list.filter(e =>
        (e.name||'').toLowerCase().includes(t) ||
        (e.winery||'').toLowerCase().includes(t) ||
        (e.region||'').toLowerCase().includes(t) ||
        (e.grape||'').toLowerCase().includes(t) ||
        (e.memo||'').toLowerCase().includes(t)
      );
    }
    return list;
  }

  function renderList(){
    renderStats();
    const list = filteredEntries();
    if(list.length === 0){
      $('list').innerHTML = `
        <div class="empty">
          <span class="glass">🍷</span>
          ${entries.length === 0 ? '아직 기록된 와인이 없습니다.<br>오른쪽 아래 + 버튼으로 첫 와인을 기록해보세요.' : '검색 결과가 없습니다.'}
        </div>`;
      return;
    }
    $('list').innerHTML = list.map(e => `
      <div class="card" data-id="${e.id}">
        <div class="thumb" style="${e.photo ? `background-image:url(${e.photo})` : ''}">${e.photo ? '' : '🍷'}</div>
        <div class="info">
          <div class="name">${escapeHtml(e.name)}</div>
          <div class="winery">${escapeHtml(e.winery || '와이너리 미상')}</div>
          <div class="stars">${starsHtml(e.rating||0)}</div>
          <div class="meta">
            ${e.vintage ? `<span>${escapeHtml(e.vintage)}</span>` : ''}
            ${e.region ? `<span>${escapeHtml(e.region)}</span>` : ''}
            ${e.grape ? `<span>${escapeHtml(e.grape)}</span>` : ''}
          </div>
        </div>
      </div>
    `).join('');
    document.querySelectorAll('.card').forEach(card=>{
      card.addEventListener('click', ()=> openDetail(card.dataset.id));
    });
  }

  function escapeHtml(str){
    return String(str||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  // ---- Form modal ----
  function openForm(entry){
    editingId = entry ? entry.id : null;
    currentPhoto = entry ? entry.photo : null;
    currentRating = entry ? (entry.rating||0) : 0;
    $('formTitle').textContent = entry ? '와인 기록 수정' : '와인 기록 추가';
    $('fName').value = entry ? entry.name || '' : '';
    $('fWinery').value = entry ? entry.winery || '' : '';
    $('fVintage').value = entry ? entry.vintage || '' : '';
    $('fRegion').value = entry ? entry.region || '' : '';
    $('fGrape').value = entry ? entry.grape || '' : '';
    $('fPrice').value = entry ? entry.price || '' : '';
    $('fDate').value = entry ? entry.date || '' : '';
    $('fMemo').value = entry ? entry.memo || '' : '';
    updatePhotoPreview();
    updateRatePicker();
    $('formModal').classList.remove('hidden');
  }

  function closeForm(){
    $('formModal').classList.add('hidden');
    $('wineForm').reset();
    editingId = null;
    currentPhoto = null;
    currentRating = 0;
  }

  function updatePhotoPreview(){
    const el = $('photoPreview');
    if(currentPhoto){
      el.style.backgroundImage = `url(${currentPhoto})`;
      el.style.backgroundSize = 'cover';
      el.style.backgroundPosition = 'center';
      el.textContent = '';
    } else {
      el.style.backgroundImage = '';
      el.textContent = '🍷';
    }
  }

  function updateRatePicker(){
    document.querySelectorAll('#ratePicker span').forEach(s=>{
      s.classList.toggle('on', Number(s.dataset.v) <= currentRating);
    });
  }

  $('ratePicker').addEventListener('click', (e)=>{
    if(e.target.dataset.v){
      currentRating = Number(e.target.dataset.v);
      updateRatePicker();
    }
  });

  $('addBtn').addEventListener('click', ()=> openForm(null));
  $('cancelBtn').addEventListener('click', closeForm);
  $('formModal').addEventListener('click', (e)=>{ if(e.target.id === 'formModal') closeForm(); });

  $('photoBtn').addEventListener('click', ()=> $('photoInput').click());
  $('photoInput').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      compressImage(ev.target.result, 800, 0.72, (dataUrl)=>{
        currentPhoto = dataUrl;
        updatePhotoPreview();
      });
    };
    reader.readAsDataURL(file);
  });

  function compressImage(src, maxW, quality, cb){
    const img = new Image();
    img.onload = ()=>{
      let w = img.width, h = img.height;
      if(w > maxW){
        h = Math.round(h * (maxW / w));
        w = maxW;
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = src;
  }

  $('wineForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const name = $('fName').value.trim();
    if(!name) return;
    const submitBtn = e.target.querySelector('button[type=submit]');
    const originalLabel = submitBtn.textContent;
    submitBtn.disabled = true;
    submitBtn.textContent = '저장 중...';

    const payload = {
      name,
      winery: $('fWinery').value.trim() || null,
      vintage: $('fVintage').value.trim() || null,
      region: $('fRegion').value.trim() || null,
      grape: $('fGrape').value.trim() || null,
      price: $('fPrice').value.trim() || null,
      date: $('fDate').value || null,
      memo: $('fMemo').value.trim() || null,
      rating: currentRating,
      photo: currentPhoto || null
    };
    // 새 항목일 때는 id를 클라이언트에서 직접 생성해 전송합니다.
    // (DB의 id 컬럼에 기본값이 없어도 저장되도록 하기 위함)
    if(!editingId){
      payload.id = makeId();
    }

    try{
      if(editingId){
        const updated = await apiUpdate(editingId, payload);
        entries = entries.map(x => x.id === editingId ? updated : x);
      } else {
        const created = await apiInsert(payload);
        entries.unshift(created);
      }
      closeForm();
      renderChips();
      renderList();
    } catch(err){
      alert('저장 중 오류가 발생했습니다.\n' + err.message);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = originalLabel;
    }
  });

  // ---- Detail modal ----
  function openDetail(id){
    const e = entries.find(x=>String(x.id)===String(id));
    if(!e) return;
    detailId = e.id;
    const photoEl = $('detailPhoto');
    if(e.photo){
      photoEl.style.backgroundImage = `url(${e.photo})`;
      photoEl.textContent = '';
    } else {
      photoEl.style.backgroundImage = '';
      photoEl.textContent = '🍷';
    }
    $('detailName').textContent = e.name;
    $('detailWinery').textContent = e.winery || '와이너리 미상';
    $('detailStars').innerHTML = starsHtml(e.rating||0);
    $('detailRegion').textContent = e.region || '-';
    $('detailGrape').textContent = e.grape || '-';
    $('detailPrice').textContent = e.price || '-';
    $('detailDate').textContent = e.date || '-';
    $('detailMemo').textContent = e.memo || '기록된 노트가 없습니다.';
    $('detailModal').classList.remove('hidden');
  }

  $('detailClose').addEventListener('click', ()=> $('detailModal').classList.add('hidden'));
  $('detailModal').addEventListener('click', (e)=>{ if(e.target.id === 'detailModal') $('detailModal').classList.add('hidden'); });

  $('editBtn').addEventListener('click', ()=>{
    const e = entries.find(x=>x.id===detailId);
    $('detailModal').classList.add('hidden');
    openForm(e);
  });

  $('deleteBtn').addEventListener('click', async ()=>{
    if(!confirm('이 와인 기록을 삭제할까요?')) return;
    const btn = $('deleteBtn');
    btn.disabled = true;
    try{
      await apiDelete(detailId);
      entries = entries.filter(x=>x.id!==detailId);
      $('detailModal').classList.add('hidden');
      renderChips();
      renderList();
    } catch(err){
      alert('삭제 중 오류가 발생했습니다.\n' + err.message);
    } finally {
      btn.disabled = false;
    }
  });

  $('searchInput').addEventListener('input', (e)=>{
    searchTerm = e.target.value;
    renderList();
  });

  // ---- Init: load from Supabase ----
  async function init(){
    $('list').innerHTML = `<div class="empty">불러오는 중...</div>`;
    try{
      entries = await apiGet();
    } catch(err){
      $('list').innerHTML = `<div class="empty">데이터를 불러오지 못했습니다.<br>${escapeHtml(err.message)}<br><br>Supabase에 'wines' 테이블과 접근 정책이 설정되어 있는지 확인해주세요.</div>`;
      renderStats();
      renderChips();
      return;
    }
    renderChips();
    renderList();
  }

  init();
})();
</script>
</body>
</html>
